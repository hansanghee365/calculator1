<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        function insert(num) {
            document.form.textview.value = document.form.textview.value + num
        }

        function back() {
            var exp = document.form.textview.value;
            document.form.textview.value = exp.substring(0, exp.length - 1);
        }

        function equal() {
            var exp = document.form.textview.value;
            if (exp) {
                document.form.textview.value = eval(exp);
            }
        }

        function clean() {
            document.form.textview.value = "";
        }
    </script>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        
        .bg {
            background: linear-gradient(to right, rgb(228, 84, 84), rgb(78, 78, 248));
            height: 1000px;
        }
        
        .main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .textview {
            width: 206px;
            margin: 5px;
            font-size: 25px;
            padding: 5px;
            border: none;
            color: rgb(107, 141, 160);
        }
        
        .button {
            width: 50px;
            height: 50px;
            font-size: 25px;
            margin: 2px;
            cursor: pointer;
            background: rgb(107, 141, 160);
            border: none;
            color: #fff;
        }
    </style>
    <title>Calculator</title>
</head>

<body>
    <div class="bg"></div>
    <div class="main">
        <form action="" name="form">
            <input type="text" class="textview" name="textview">
        </form>
        <table>
            <tbody>
                <tr>
                    <td>
                        <input class="button" type="button" value="C" onclick="clean()">
                    </td>
                    <td>
                        <input class="button" type="button" value="<" onclick="back()">
                    </td>
                    <td>
                        <input class="button" type="button" value="/" onclick="insert('/')">
                    </td>
                    <td>
                        <input class="button" type="button" value="X" onclick="insert('*')">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input class="button" type="button" value="7" onclick="insert(7)">
                    </td>
                    <td>
                        <input class="button" type="button" value="8" onclick="insert(8)">
                    </td>
                    <td>
                        <input class="button" type="button" value="9" onclick="insert(9)">
                    </td>
                    <td>
                        <input class="button" type="button" value="-" onclick="insert('-')">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input class="button" type="button" value="4" onclick="insert(4)">
                    </td>
                    <td>
                        <input class="button" type="button" value="5" onclick="insert(5)">
                    </td>
                    <td>
                        <input class="button" type="button" value="6" onclick="insert(6)">
                    </td>
                    <td>
                        <input class="button" type="button" value="+" onclick="insert('+')">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input class="button" type="button" value="1" onclick="insert(1)">
                    </td>
                    <td>
                        <input class="button" type="button" value="2" onclick="insert(2)">
                    </td>
                    <td>
                        <input class="button" type="button" value="3" onclick="insert(3)">
                    </td>
                    <td rowspan="2">
                        <input class="button" style="height: 106px;" type="button" value="=" onclick="equal()">
                    </td>
                    <tr>
                        <td colspan="2">
                            <input class="button" style="width: 106px;" type="button" value="0" onclick="insert(0)">
                        </td>
                        <td>
                            <input class="button" type="button" value="." onclick="insert('.')">
                        </td>
                    </tr>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
